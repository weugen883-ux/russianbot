<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket-Konfigurator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg:        #0d0f14;
  --bg1:       #13161e;
  --bg2:       #181c26;
  --bg3:       #1e2330;
  --border:    #252c3e;
  --border2:   #2e3750;
  --cyan:      #00d4ff;
  --cyan-dim:  #003d4d;
  --cyan-glow: rgba(0,212,255,0.12);
  --ink:       #e8edf5;
  --ink2:      #8899bb;
  --ink3:      #4a5570;
  --red:       #ff4757;
  --green:     #2ed573;
  --amber:     #ffa502;
  --sans: 'Inter', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 56px;
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-mark {
  width: 32px;
  height: 32px;
  background: var(--cyan);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  box-shadow: 0 0 16px var(--cyan-glow);
}

.topbar-title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.topbar-sub {
  font-size: 12px;
  color: var(--ink3);
  font-family: var(--mono);
  margin-top: 1px;
}

/* Verbindungsanzeige */
.conn-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: 100px;
  border: 1px solid var(--border);
  font-size: 12px;
  font-family: var(--mono);
  transition: all 0.3s;
}

.conn-badge.connected {
  border-color: var(--green);
  color: var(--green);
  background: rgba(46,213,115,0.06);
}

.conn-badge.disconnected {
  border-color: var(--red);
  color: var(--red);
  background: rgba(255,71,87,0.06);
}

.conn-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: currentColor;
}

.conn-badge.connected .conn-dot {
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── LAYOUT ── */
.workspace {
  display: grid;
  grid-template-columns: 1fr 380px;
  flex: 1;
  overflow: hidden;
}

@media (max-width: 900px) {
  .workspace { grid-template-columns: 1fr; }
  .preview-pane { display: none; }
}

/* ── EDITOR PANE ── */
.editor-pane {
  padding: 28px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink3);
  font-family: var(--mono);
}

.count-badge {
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 100px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--ink2);
}

/* ── TICKET CARD ── */
.card-list { display: flex; flex-direction: column; gap: 10px; }

.ticket-card {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: default;
  transition: border-color 0.2s, box-shadow 0.2s;
  position: relative;
}

.ticket-card:hover {
  border-color: var(--border2);
}

.ticket-card.drag-over {
  border-color: var(--cyan);
  box-shadow: 0 0 0 1px var(--cyan), inset 0 0 20px var(--cyan-glow);
}

.ticket-card.dragging { opacity: 0.35; }

.card-row1 {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  margin-bottom: 14px;
}

.field-wrap { display: flex; flex-direction: column; gap: 5px; }
.field-wrap.grow { flex: 1; min-width: 0; }

.field-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink3);
}

input[type="text"] {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--ink);
  font-family: var(--sans);
  font-size: 13.5px;
  padding: 9px 12px;
  outline: none;
  width: 100%;
  transition: border-color 0.15s, box-shadow 0.15s;
}

input[type="text"]:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px var(--cyan-glow);
}

input[type="text"]::placeholder { color: var(--ink3); }

.emoji-field {
  width: 52px;
  text-align: center;
  font-size: 17px;
  flex-shrink: 0;
  padding: 9px 6px;
}

/* Farbwahl */
.color-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.swatches {
  display: flex;
  gap: 6px;
}

.swatch {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.15s, box-shadow 0.15s;
  position: relative;
}

.swatch:hover { transform: scale(1.15); }

.swatch.active {
  border-color: white;
  box-shadow: 0 0 8px rgba(255,255,255,0.3);
}

.swatch-label {
  font-size: 11px;
  color: var(--ink3);
  font-family: var(--mono);
}

/* Drag handle + Delete */
.card-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  padding-bottom: 1px;
}

.drag-handle {
  color: var(--ink3);
  cursor: grab;
  padding: 8px 6px;
  border-radius: 6px;
  font-size: 14px;
  line-height: 1;
  letter-spacing: -3px;
  transition: color 0.15s;
}

.drag-handle:hover { color: var(--ink2); }
.drag-handle:active { cursor: grabbing; }

.del-btn {
  background: none;
  border: none;
  color: var(--ink3);
  cursor: pointer;
  padding: 7px 8px;
  border-radius: 6px;
  font-size: 15px;
  line-height: 1;
  transition: color 0.15s, background 0.15s;
}

.del-btn:hover {
  color: var(--red);
  background: rgba(255,71,87,0.1);
}

/* Indexnummer links */
.card-index {
  position: absolute;
  top: -1px;
  left: -1px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px 0 8px 0;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink3);
  padding: 3px 8px;
}

/* ── ADD BUTTON ── */
.add-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 13px;
  background: transparent;
  border: 1px dashed var(--border2);
  border-radius: 12px;
  color: var(--ink3);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}

.add-btn:hover:not(:disabled) {
  border-color: var(--cyan);
  color: var(--cyan);
  background: var(--cyan-glow);
}

.add-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* ── SAVE BAR ── */
.save-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 12px;
  gap: 12px;
}

.save-status {
  font-size: 12px;
  font-family: var(--mono);
  color: var(--ink3);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.save-status.ok { color: var(--green); }
.save-status.err { color: var(--red); }

.btn-row { display: flex; gap: 8px; }

.btn {
  padding: 9px 20px;
  border-radius: 8px;
  border: none;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: filter 0.15s, transform 0.08s;
  white-space: nowrap;
}

.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--cyan);
  color: #060a10;
  box-shadow: 0 0 16px var(--cyan-glow);
}

.btn-primary:hover { filter: brightness(1.1); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

.btn-ghost {
  background: var(--bg3);
  color: var(--ink2);
  border: 1px solid var(--border);
}

.btn-ghost:hover { border-color: var(--border2); color: var(--ink); }

/* ── PREVIEW PANE ── */
.preview-pane {
  background: var(--bg1);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.preview-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink3);
  font-family: var(--mono);
  display: flex;
  align-items: center;
  gap: 8px;
}

.preview-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 6px var(--cyan);
}

.preview-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* Discord-Mockup */
.discord-mockup {
  background: #313338;
  border-radius: 10px;
  overflow: hidden;
}

.discord-channel-header {
  background: #2b2d31;
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 600;
  color: #f2f3f5;
  border-bottom: 1px solid #1e1f22;
  display: flex;
  align-items: center;
  gap: 8px;
}

.discord-channel-icon {
  color: #80848e;
  font-size: 16px;
}

.discord-messages {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.discord-msg {
  display: flex;
  gap: 14px;
  padding: 4px 0;
}

.discord-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00d4ff 0%, #0055aa 100%);
  flex-shrink: 0;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.discord-msg-body { flex: 1; min-width: 0; }

.discord-author-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 6px;
}

.discord-author {
  font-size: 14px;
  font-weight: 600;
  color: #00d4ff;
}

.discord-bot-tag {
  font-size: 9px;
  font-weight: 700;
  background: #5865f2;
  color: white;
  padding: 1px 5px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.discord-time {
  font-size: 11px;
  color: #4e5058;
}

.discord-ticket-item { margin-bottom: 10px; }

.discord-ticket-name {
  font-size: 14px;
  color: #dbdee1;
  margin-bottom: 5px;
  line-height: 1.4;
}

.discord-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 4px;
  font-size: 13.5px;
  font-weight: 500;
  color: white;
  border: none;
  cursor: default;
  user-select: none;
}

.dc-blurple { background: #5865f2; }
.dc-grey    { background: #4e5058; }
.dc-green   { background: #248046; }
.dc-red     { background: #da373c; }

.preview-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--ink3);
  font-size: 13px;
  line-height: 1.6;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--bg2);
  border: 1px solid var(--border2);
  color: var(--ink);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-family: var(--mono);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
  z-index: 999;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">🎫</div>
    <div>
      <div class="topbar-title">Ticket-Konfigurator</div>
      <div class="topbar-sub">config/ticketTypes.js</div>
    </div>
  </div>
  <div class="conn-badge disconnected" id="connBadge">
    <div class="conn-dot"></div>
    <span id="connText">Verbinde...</span>
  </div>
</header>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- EDITOR -->
  <div class="editor-pane">
    <div>
      <div class="section-head">
        <span class="section-label">Ticket-Kategorien</span>
        <span class="count-badge" id="countBadge">0 / 12</span>
      </div>
    </div>

    <div class="card-list" id="cardList"></div>

    <button class="add-btn" id="addBtn">
      <span style="font-size:18px;line-height:1;">+</span>
      Kategorie hinzufügen
    </button>

    <div class="save-bar">
      <div class="save-status" id="saveStatus">Bereit.</div>
      <div class="btn-row">
        <button class="btn btn-ghost" id="resetBtn">Zurücksetzen</button>
        <button class="btn btn-primary" id="saveBtn">💾 Speichern</button>
      </div>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-pane">
    <div class="preview-header">
      <div class="preview-dot"></div>
      Live-Vorschau
    </div>
    <div class="preview-scroll">
      <div class="discord-mockup">
        <div class="discord-channel-header">
          <span class="discord-channel-icon">#</span>
          создать-тикет
        </div>
        <div class="discord-messages">
          <div class="discord-msg">
            <div class="discord-avatar">🤖</div>
            <div class="discord-msg-body">
              <div class="discord-author-row">
                <span class="discord-author">Tender Bot</span>
                <span class="discord-bot-tag">APP</span>
                <span class="discord-time" id="previewTime"></span>
              </div>
              <div id="previewContent">
                <div class="preview-empty">Noch keine Kategorien angelegt.</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API = "http://localhost:3001";

const COLORS = [
  { id: "blurple", hex: "#5865f2", label: "Blau",  dc: "dc-blurple" },
  { id: "grey",    hex: "#4e5058", label: "Grau",  dc: "dc-grey"    },
  { id: "green",   hex: "#248046", label: "Grün",  dc: "dc-green"   },
  { id: "red",     hex: "#da373c", label: "Rot",   dc: "dc-red"     },
];

const DEFAULT_TICKETS = [
  { label: "Тикет если вы не получили роль", emoji: "📩", color: "blurple", prefix: "role"      },
  { label: "Тикет на репорт бага",           emoji: "📩", color: "grey",    prefix: "bug"       },
  { label: "Тикет на репорт модератора",     emoji: "📩", color: "green",   prefix: "modreport" },
  { label: "Тикет на репорт участников",     emoji: "📩", color: "red",     prefix: "report"    },
];

let tickets = [];
let dragSrcIdx = null;
let connected = false;

// ── Verbindung prüfen ──
async function checkConnection() {
  try {
    const r = await fetch(`${API}/load`, { signal: AbortSignal.timeout(2000) });
    if (r.ok) {
      const data = await r.json();
      setConnected(true);
      if (data.ok && data.tickets?.length > 0) {
        tickets = data.tickets;
        render();
        setStatus(`Geladen: ${tickets.length} Kategorien aus ticketTypes.js`, "ok");
      } else {
        tickets = JSON.parse(JSON.stringify(DEFAULT_TICKETS));
        render();
        setStatus("Neue Konfiguration — Speichern um ticketTypes.js zu erstellen.", "");
      }
    } else { throw new Error(); }
  } catch {
    setConnected(false);
    if (tickets.length === 0) {
      tickets = JSON.parse(JSON.stringify(DEFAULT_TICKETS));
      render();
    }
    setStatus("⚠ Server nicht erreichbar — Starte node server.js", "err");
  }
}

function setConnected(val) {
  connected = val;
  const badge = document.getElementById("connBadge");
  const text  = document.getElementById("connText");
  badge.className = "conn-badge " + (val ? "connected" : "disconnected");
  text.textContent = val ? "Verbunden" : "Kein Server";
}

// ── Hilfsfunktionen ──
function slugify(text, fallback) {
  const s = (text || "").toLowerCase().replace(/[^a-z0-9]/gi, "").replace(/[\u0400-\u04FF]/g, "").slice(0, 16);
  return s || fallback;
}

function makeId(t, i) {
  return (slugify(t.prefix || t.label, "ticket" + (i + 1))) + "_" + (i + 1);
}

function esc(str) {
  return (str || "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

function setStatus(msg, type) {
  const el = document.getElementById("saveStatus");
  el.textContent = msg;
  el.className = "save-status " + (type || "");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

// ── Render Editor ──
function render() {
  const list = document.getElementById("cardList");
  list.innerHTML = "";

  document.getElementById("countBadge").textContent = `${tickets.length} / 12`;
  document.getElementById("addBtn").disabled = tickets.length >= 12;

  tickets.forEach((t, i) => {
    const card = document.createElement("div");
    card.className = "ticket-card";
    card.draggable = true;
    card.dataset.index = i;

    card.innerHTML = `
      <div class="card-index">${i + 1}</div>
      <div class="card-row1">
        <div class="field-wrap">
          <div class="field-label">Emoji</div>
          <input type="text" class="emoji-field" data-field="emoji" value="${esc(t.emoji)}" maxlength="8" placeholder="📩">
        </div>
        <div class="field-wrap grow">
          <div class="field-label">Name der Kategorie</div>
          <input type="text" data-field="label" value="${esc(t.label)}" placeholder="z.B. Тикет на репорт бага">
        </div>
        <div class="card-actions">
          <div class="drag-handle" title="Ziehen zum Sortieren">⠿</div>
          <button class="del-btn" title="Entfernen">✕</button>
        </div>
      </div>
      <div class="color-row">
        <div class="field-label" style="margin-right:4px;">Farbe</div>
        <div class="swatches">
          ${COLORS.map(c => `<div class="swatch ${c.id === t.color ? "active" : ""}" data-color="${c.id}" style="background:${c.hex}" title="${c.label}"></div>`).join("")}
        </div>
        <div class="swatch-label">${COLORS.find(c => c.id === t.color)?.label || ""}</div>
      </div>
    `;

    // Events
    card.querySelector('[data-field="label"]').addEventListener("input", e => {
      tickets[i].label = e.target.value;
      renderPreview();
    });
    card.querySelector('[data-field="emoji"]').addEventListener("input", e => {
      tickets[i].emoji = e.target.value;
      renderPreview();
    });
    card.querySelector(".del-btn").addEventListener("click", () => {
      tickets.splice(i, 1);
      render();
      showToast("Kategorie entfernt");
    });
    card.querySelectorAll(".swatch").forEach(sw => {
      sw.addEventListener("click", () => {
        tickets[i].color = sw.dataset.color;
        render();
      });
    });

    // Drag & Drop
    card.addEventListener("dragstart", () => { dragSrcIdx = i; card.classList.add("dragging"); });
    card.addEventListener("dragend",   () => card.classList.remove("dragging"));
    card.addEventListener("dragover",  e => { e.preventDefault(); card.classList.add("drag-over"); });
    card.addEventListener("dragleave", () => card.classList.remove("drag-over"));
    card.addEventListener("drop", e => {
      e.preventDefault();
      card.classList.remove("drag-over");
      if (dragSrcIdx === null || dragSrcIdx === i) return;
      const moved = tickets.splice(dragSrcIdx, 1)[0];
      tickets.splice(i, 0, moved);
      dragSrcIdx = null;
      render();
    });

    list.appendChild(card);
  });

  renderPreview();
}

// ── Render Preview ──
function renderPreview() {
  const el = document.getElementById("previewContent");
  if (tickets.length === 0) {
    el.innerHTML = `<div class="preview-empty">Noch keine Kategorien angelegt.</div>`;
    return;
  }
  const colorMap = { blurple: "dc-blurple", grey: "dc-grey", green: "dc-green", red: "dc-red" };
  el.innerHTML = tickets.map(t => `
    <div class="discord-ticket-item">
      <div class="discord-ticket-name">${esc(t.label) || "(kein Name)"}</div>
      <button class="discord-btn ${colorMap[t.color] || "dc-blurple"}">
        <span>${esc(t.emoji) || "📩"}</span><span>Создать тикет</span>
      </button>
    </div>
  `).join("");
}

// ── Speichern ──
async function save() {
  if (!connected) {
    setStatus("⚠ Kein Server — Starte node server.js", "err");
    showToast("Nicht verbunden!");
    return;
  }
  if (tickets.length === 0) {
    setStatus("Mindestens 1 Kategorie nötig.", "err");
    return;
  }

  const saveBtn = document.getElementById("saveBtn");
  saveBtn.disabled = true;
  saveBtn.textContent = "Speichere...";
  setStatus("Speichere...", "");

  try {
    const r = await fetch(`${API}/save`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tickets }),
    });
    const data = await r.json();
    if (data.ok) {
      setStatus(`✅ config/ticketTypes.js gespeichert — ${new Date().toLocaleTimeString("de-DE")}`, "ok");
      showToast("Gespeichert ✓");
    } else {
      throw new Error(data.error);
    }
  } catch (e) {
    setStatus("❌ Fehler: " + e.message, "err");
    showToast("Fehler beim Speichern!");
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = "💾 Speichern";
  }
}

// ── Events ──
document.getElementById("addBtn").addEventListener("click", () => {
  if (tickets.length >= 12) return;
  tickets.push({ label: "", emoji: "📩", color: "blurple", prefix: "" });
  render();
  // Fokus auf neues Namensfeld
  setTimeout(() => {
    const inputs = document.querySelectorAll('[data-field="label"]');
    inputs[inputs.length - 1]?.focus();
  }, 50);
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("Wirklich auf die 4 Standard-Kategorien zurücksetzen?")) return;
  tickets = JSON.parse(JSON.stringify(DEFAULT_TICKETS));
  render();
  setStatus("Zurückgesetzt auf Standard.", "");
  showToast("Zurückgesetzt");
});

document.getElementById("saveBtn").addEventListener("click", save);

// Strg+S zum Speichern
document.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); save(); }
});

// ── Init ──
document.getElementById("previewTime").textContent =
  new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });

checkConnection();
// Alle 5 Sekunden Verbindung neu prüfen
setInterval(async () => {
  try {
    const r = await fetch(`${API}/load`, { signal: AbortSignal.timeout(1500) });
    setConnected(r.ok);
  } catch { setConnected(false); }
}, 5000);
</script>
</body>
</html>
